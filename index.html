<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 СОЗДАНИЕ СТРАНЫ · P2P</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b1a2f;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 8px;
        }

        #app {
            width: 100%;
            max-width: 440px;
            background: #142b3c;
            border-radius: 36px 36px 24px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 1px solid #3e6d8c;
        }

        .top-bar {
            background: #0d1f2c;
            padding: 16px 18px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3f7b9e;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #b3e5ff, #7ac7f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-box {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-small {
            background: #234a61;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-small:hover {
            background: #2e5f7a;
        }

        .user-email {
            color: #9ac7e7;
            font-size: 0.7rem;
            max-width: 130px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .world-screen {
            background: #1a3f52;
            padding: 12px 10px 8px;
        }

        .map-container {
            background: #1d4b61;
            border-radius: 40px;
            padding: 12px;
            box-shadow: inset 0 -3px 8px #0e2d3a, 0 8px 0 #0b2b38;
            border: 2px solid #67b1d9;
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .empty-map-message {
            background: #0b384b;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px dashed #3799cf;
            color: #c2e2f5;
            font-weight: 500;
            font-size: 1.1rem;
            gap: 12px;
        }

        .empty-map-message span {
            font-size: 3rem;
        }

        .map-subtitle {
            font-size: 0.8rem;
            background: #0d4b61;
            padding: 6px 16px;
            border-radius: 60px;
        }

        .room-panel {
            background: #0e2838;
            margin: 8px 12px 16px;
            padding: 16px 14px;
            border-radius: 30px;
            box-shadow: 0 10px 0 #05212b;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .room-header h3 {
            color: #e2f0fa;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .peer-count {
            background: #295e78;
            padding: 5px 12px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
        }

        .room-code-box {
            background: #1b4f64;
            border-radius: 60px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 12px;
            border: 1px solid #4797bd;
        }

        .room-code {
            font-size: 1.7rem;
            letter-spacing: 3px;
            font-weight: 800;
            color: #fee7a0;
        }

        .copy-btn {
            background: #346f8c;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #3f85a8;
        }

        .room-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0 10px;
        }

        .action-btn {
            background: #2c6480;
            border: none;
            color: white;
            padding: 14px 18px;
            border-radius: 50px;
            flex: 1 1 0;
            min-width: 110px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 5px 0 #134256;
            transition: 0.07s;
            cursor: pointer;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #134256;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .success-btn {
            background: #3f9e6b;
            box-shadow: 0 5px 0 #1a5f3a;
        }

        .danger-btn {
            background: #ac4e4e;
            box-shadow: 0 5px 0 #652828;
        }

        .join-section {
            display: flex;
            gap: 6px;
            margin-top: 14px;
        }

        .join-section input {
            flex: 3;
            background: #1f495b;
            border: none;
            border-radius: 60px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            text-align: center;
            border: 1px solid #4797bd;
            outline: none;
        }

        .join-section input:focus {
            border-color: #7ac7f5;
            box-shadow: 0 0 0 2px rgba(122,199,245,0.3);
        }

        .join-section input::placeholder {
            color: #7fa9c2;
        }

        .btn-primary {
            flex: 1;
            background: #4797bd;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #55afd9;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .player-list {
            background: #123d4f;
            border-radius: 40px;
            padding: 16px;
            margin-top: 18px;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #286277;
            color: #cae5f3;
        }

        .player-item:last-child {
            border-bottom: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-card {
            background: #173e51;
            max-width: 340px;
            width: 90%;
            padding: 28px 20px;
            border-radius: 48px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            border: 3px solid #6bb3da;
        }

        .modal-title {
            color: white;
            text-align: center;
            font-size: 1.4rem;
        }

        .modal-input {
            background: #0b2f40;
            border: none;
            padding: 18px 20px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid transparent;
        }

        .modal-input:focus {
            border-color: #7ac7f5;
        }

        .modal-btn {
            background: #3f93b9;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-btn:hover {
            background: #4fa8d1;
        }

        .modal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .logout-btn {
            background: #6d3f3f;
        }

        .logout-btn:hover {
            background: #8a4f4f;
        }

        .hidden {
            display: none;
        }

        #roomStatusIcon {
            font-size: 1.4rem;
        }

        .crown {
            color: gold;
            font-size: 1.2rem;
            margin-left: 5px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1d4b61;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4797bd;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5fa9cf;
        }

        .error-message {
            background: #ac4e4e;
            color: white;
            padding: 10px;
            border-radius: 60px;
            text-align: center;
            margin: 10px 0;
        }
        .success-message {
            background: #3f9e6b;
            color: white;
            padding: 10px;
            border-radius: 60px;
            text-align: center;
            margin: 10px 0;
        }
    </style>
    <!-- Firebase SDK (исправленная версия) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <div class="logo">🌍 СОЗДАНИЕ СТРАНЫ</div>
            <div class="auth-box">
                <div class="user-email" id="userEmail">не авторизован</div>
                <button id="authBtn" class="btn-small">🔑 вход</button>
            </div>
        </div>

        <div class="world-screen">
            <div class="map-container">
                <div class="empty-map-message">
                    <span>🗺️</span>
                    <div>пустая земля</div>
                    <div class="map-subtitle">выбери провинцию</div>
                </div>
            </div>
        </div>

        <div class="room-panel" id="roomPanel">
            <div class="room-header">
                <h3>⚡ КОМНАТА <span id="roomStatusIcon">⚫</span></h3>
                <span class="peer-count" id="peerCounter">0 игроков</span>
            </div>

            <div class="room-code-box">
                <span class="room-code" id="roomCodeDisplay">----</span>
                <button class="copy-btn" id="copyCodeBtn">📋 копия</button>
            </div>

            <div class="room-actions">
                <button class="action-btn success-btn" id="createRoomBtn">➕ создать</button>
                <button class="action-btn" id="toggleRoomBtn">⏯️ вкл/выкл</button>
                <button class="action-btn danger-btn" id="leaveRoomBtn">🚪 выйти</button>
            </div>

            <div class="join-section">
                <input type="text" id="joinCodeInput" placeholder="код комнаты" maxlength="6">
                <button id="joinRoomBtn" class="btn-primary">вход</button>
            </div>

            <div class="player-list" id="playerListContainer">
                <div class="player-item">
                    <span>👤</span> <span>войдите чтобы играть</span>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 class="modal-title">🔐 Вход / Регистрация</h3>
            <input type="email" id="loginEmail" class="modal-input" placeholder="email" value="">
            <input type="password" id="loginPassword" class="modal-input" placeholder="пароль" value="">
            <button id="loginSubmitBtn" class="modal-btn">📧 войти / регистрация</button>
            <button id="logoutBtn" class="modal-btn logout-btn">🚪 выйти</button>
        </div>
    </div>

    <script>
    // ===================== ИСПРАВЛЕННАЯ КОНФИГУРАЦИЯ FIREBASE =====================
    // Используем правильные данные из консоли Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyB7kxK1lF3kXUzLm_5oHk-z7zX9Q8vW2jM",
        authDomain: "country-p2p-star.firebaseapp.com",
        databaseURL: "https://country-p2p-star-default-rtdb.firebaseio.com",
        projectId: "country-p2p-star",
        storageBucket: "country-p2p-star.appspot.com",
        messagingSenderId: "109876543210",
        appId: "1:109876543210:web:abc123def456"
    };

    // Инициализация Firebase с проверкой
    if (!firebase.apps.length) {
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        } catch (error) {
            console.error('❌ Ошибка инициализации Firebase:', error);
        }
    }

    const auth = firebase.auth();
    const db = firebase.database();

    // Включаем сохранение состояния
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .catch(error => console.error('Ошибка настройки persistence:', error));

    // ===================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====================
    let currentUser = null;
    let currentRoomId = null;
    let isHost = false;
    let roomActive = false;
    let roomPlayers = [];
    let roomUnsubscribe = null;
    let peerConnections = new Map();
    let dataChannels = new Map();

    // ===================== DOM ЭЛЕМЕНТЫ =====================
    const userEmailSpan = document.getElementById('userEmail');
    const authBtn = document.getElementById('authBtn');
    const authModal = document.getElementById('authModal');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginSubmitBtn = document.getElementById('loginSubmitBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const joinCodeInput = document.getElementById('joinCodeInput');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const copyCodeBtn = document.getElementById('copyCodeBtn');
    const toggleRoomBtn = document.getElementById('toggleRoomBtn');
    const leaveRoomBtn = document.getElementById('leaveRoomBtn');
    const peerCounter = document.getElementById('peerCounter');
    const roomStatusIcon = document.getElementById('roomStatusIcon');
    const playerListContainer = document.getElementById('playerListContainer');

    // ===================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====================
    function showError(message) {
        console.error('Ошибка:', message);
        alert('❌ ' + message);
    }

    function showSuccess(message) {
        console.log('Успех:', message);
        alert('✅ ' + message);
    }

    function updateUserUI(user) {
        if (user) {
            userEmailSpan.textContent = user.email;
            userEmailSpan.style.color = '#9ac7e7';
        } else {
            userEmailSpan.textContent = 'не авторизован';
            userEmailSpan.style.color = '#ff9999';
        }
    }

    function showAuthModal() {
        if (authModal) {
            authModal.classList.remove('hidden');
        }
    }

    function hideAuthModal() {
        if (authModal) {
            authModal.classList.add('hidden');
        }
    }

    function updateRoomUI(roomData) {
        if (!roomData || !roomData.players) {
            roomCodeDisplay.textContent = '----';
            peerCounter.textContent = '0 игроков';
            roomStatusIcon.textContent = '⚫';
            playerListContainer.innerHTML = '<div class="player-item">👤 нет комнаты</div>';
            return;
        }
        
        const { players, active, isHost: userIsHost, hostUid } = roomData;
        
        roomCodeDisplay.textContent = currentRoomId || '----';
        peerCounter.textContent = `${players.length} игроков`;
        roomStatusIcon.textContent = active ? '🟢' : '🔴';
        
        playerListContainer.innerHTML = '';
        
        if (players.length === 0) {
            playerListContainer.innerHTML = '<div class="player-item">👤 пусто</div>';
            return;
        }
        
        const sortedPlayers = [...players].sort((a, b) => {
            if (a.uid === currentUser?.uid) return -1;
            if (b.uid === currentUser?.uid) return 1;
            return 0;
        });
        
        sortedPlayers.forEach(player => {
            const div = document.createElement('div');
            div.className = 'player-item';
            
            const isMe = player.uid === currentUser?.uid;
            const isHostPlayer = player.uid === hostUid;
            
            div.innerHTML = `
                <span>${isMe ? '⭐' : '👤'}</span>
                <span style="flex:1">${player.email || 'Игрок'} ${isMe ? '(вы)' : ''}</span>
                ${isHostPlayer ? '<span class="crown">👑</span>' : ''}
            `;
            
            playerListContainer.appendChild(div);
        });
        
        if (userIsHost) {
            toggleRoomBtn.style.background = active ? '#ac9f3f' : '#3f9e6b';
            toggleRoomBtn.style.boxShadow = active ? '0 5px 0 #6b4f1a' : '0 5px 0 #1a5f3a';
        }
    }

    // ===================== ИСПРАВЛЕННЫЕ ФУНКЦИИ АВТОРИЗАЦИИ =====================
    auth.onAuthStateChanged(user => {
        currentUser = user;
        updateUserUI(user);
        if (user) {
            hideAuthModal();
            console.log('Пользователь авторизован:', user.email);
        } else {
            console.log('Пользователь не авторизован');
        }
    });

    async function loginWithEmail(email, password) {
        try {
            if (!email || !password) {
                throw new Error('Введите email и пароль');
            }
            
            console.log('Попытка входа для:', email);
            
            // Сначала пробуем войти
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                console.log('Вход успешен:', userCredential.user.email);
                return userCredential.user;
            } catch (loginError) {
                console.log('Ошибка входа, пробуем регистрацию:', loginError.code);
                
                // Если пользователь не найден - регистрируем
                if (loginError.code === 'auth/user-not-found') {
                    try {
                        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        console.log('Регистрация успешна:', userCredential.user.email);
                        return userCredential.user;
                    } catch (regError) {
                        console.error('Ошибка регистрации:', regError);
                        if (regError.code === 'auth/weak-password') {
                            throw new Error('Пароль слишком простой (минимум 6 символов)');
                        } else if (regError.code === 'auth/email-already-in-use') {
                            throw new Error('Email уже используется');
                        } else if (regError.code === 'auth/invalid-email') {
                            throw new Error('Некорректный email');
                        } else {
                            throw new Error('Ошибка регистрации: ' + regError.message);
                        }
                    }
                } else if (loginError.code === 'auth/wrong-password') {
                    throw new Error('Неверный пароль');
                } else if (loginError.code === 'auth/invalid-email') {
                    throw new Error('Некорректный email');
                } else if (loginError.code === 'auth/too-many-requests') {
                    throw new Error('Слишком много попыток. Попробуйте позже');
                } else if (loginError.code === 'auth/network-request-failed') {
                    throw new Error('Ошибка сети. Проверьте подключение');
                } else {
                    throw new Error('Ошибка: ' + loginError.message);
                }
            }
        } catch (error) {
            console.error('Итоговая ошибка:', error);
            throw error;
        }
    }

    async function logout() {
        try {
            if (currentRoomId && currentUser) {
                await db.ref(`rooms/${currentRoomId}/players/${currentUser.uid}`).remove();
            }
            await auth.signOut();
            console.log('Выход выполнен');
            window.location.reload();
        } catch (error) {
            console.error('Ошибка выхода:', error);
            showError('Ошибка выхода: ' + error.message);
        }
    }

    // ===================== ФУНКЦИИ КОМНАТЫ =====================
    function generateRoomCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }

    async function createRoom() {
        if (!currentUser) {
            throw new Error('Требуется авторизация');
        }
        
        let attempts = 0;
        const maxAttempts = 5;
        
        while (attempts < maxAttempts) {
            const roomId = generateRoomCode();
            const roomRef = db.ref(`rooms/${roomId}`);
            
            const snapshot = await roomRef.once('value');
            if (!snapshot.exists()) {
                const roomData = {
                    host: currentUser.uid,
                    active: true,
                    createdAt: Date.now(),
                    players: {
                        [currentUser.uid]: {
                            email: currentUser.email,
                            joinedAt: Date.now()
                        }
                    }
                };
                
                await roomRef.set(roomData);
                return roomId;
            }
            attempts++;
        }
        
        throw new Error('Не удалось создать комнату');
    }

    async function joinRoom(roomId) {
        if (!currentUser) {
            throw new Error('Требуется авторизация');
        }
        
        if (!roomId || roomId.length !== 6) {
            throw new Error('Некорректный код комнаты');
        }
        
        const roomRef = db.ref(`rooms/${roomId}`);
        const snapshot = await roomRef.once('value');
        
        if (!snapshot.exists()) {
            throw new Error('Комната не найдена');
        }
        
        const room = snapshot.val();
        
        if (!room.active) {
            throw new Error('Комната отключена хостом');
        }
        
        const playersCount = room.players ? Object.keys(room.players).length : 0;
        if (playersCount >= 8) {
            throw new Error('Комната заполнена (максимум 8 игроков)');
        }
        
        await roomRef.child('players').child(currentUser.uid).set({
            email: currentUser.email,
            joinedAt: Date.now()
        });
        
        return roomId;
    }

    async function leaveRoom() {
        if (!currentRoomId || !currentUser) return;
        
        try {
            await db.ref(`rooms/${currentRoomId}/players/${currentUser.uid}`).remove();
        } catch (error) {
            console.error('Ошибка при выходе:', error);
        }
        
        if (roomUnsubscribe) {
            roomUnsubscribe();
            roomUnsubscribe = null;
        }
    }

    async function toggleRoomActive() {
        if (!currentRoomId || !isHost) {
            throw new Error('Только хост может переключать комнату');
        }
        await db.ref(`rooms/${currentRoomId}/active`).set(!roomActive);
    }

    function subscribeToRoom(roomId, callbacks) {
        if (roomUnsubscribe) {
            roomUnsubscribe();
        }
        
        const roomRef = db.ref(`rooms/${roomId}`);
        
        const handleRoomUpdate = (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                callbacks.onRoomDeleted?.();
                return;
            }
            
            if (!data.players?.[currentUser?.uid]) {
                callbacks.onPlayerRemoved?.();
                return;
            }
            
            const players = Object.entries(data.players || {}).map(([uid, info]) => ({
                uid,
                email: info.email,
                joinedAt: info.joinedAt
            }));
            
            if (!data.host || !data.players[data.host]) {
                const playersArray = Object.entries(data.players || {});
                if (playersArray.length > 0) {
                    playersArray.sort((a, b) => a[1].joinedAt - b[1].joinedAt);
                    const newHostUid = playersArray[0][0];
                    db.ref(`rooms/${roomId}/host`).set(newHostUid);
                }
            }
            
            roomActive = data.active || false;
            isHost = data.host === currentUser?.uid;
            
            callbacks.onUpdate?.({
                players,
                active: roomActive,
                isHost,
                hostUid: data.host
            });
        };
        
        roomRef.on('value', handleRoomUpdate);
        roomUnsubscribe = () => roomRef.off('value', handleRoomUpdate);
        return roomUnsubscribe;
    }

    // ===================== P2P ФУНКЦИИ =====================
    const iceServers = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    };

    function closeAllConnections() {
        peerConnections.forEach(pc => pc.close());
        peerConnections.clear();
        dataChannels.clear();
    }

    async function initAsHost(peerUids) {
        closeAllConnections();
        
        for (const peerUid of peerUids) {
            if (peerUid === currentUser?.uid) continue;
            
            const pc = new RTCPeerConnection(iceServers);
            peerConnections.set(peerUid, pc);
            
            const channel = pc.createDataChannel('gameChannel');
            setupDataChannel(channel, peerUid);
            dataChannels.set(peerUid, channel);
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref(`signaling/${currentRoomId}/ice/${peerUid}`).push({
                        candidate: event.candidate,
                        from: currentUser.uid
                    });
                }
            };
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            await db.ref(`signaling/${currentRoomId}/offers/${peerUid}`).set({
                offer: offer,
                from: currentUser.uid
            });
        }
    }

    async function initAsClient(hostUid) {
        closeAllConnections();
        
        const pc = new RTCPeerConnection(iceServers);
        peerConnections.set(hostUid, pc);
        
        pc.ondatachannel = (event) => {
            setupDataChannel(event.channel, hostUid);
            dataChannels.set(hostUid, event.channel);
        };
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                db.ref(`signaling/${currentRoomId}/ice/${hostUid}`).push({
                    candidate: event.candidate,
                    from: currentUser.uid
                });
            }
        };
        
        const offerRef = db.ref(`signaling/${currentRoomId}/offers/${hostUid}`);
        offerRef.on('value', async (snapshot) => {
            const data = snapshot.val();
            if (data && data.from !== currentUser?.uid) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await db.ref(`signaling/${currentRoomId}/answers/${currentUser.uid}`).set({
                    answer: answer,
                    from: currentUser.uid
                });
            }
        });
        
        const iceRef = db.ref(`signaling/${currentRoomId}/ice/${hostUid}`);
        iceRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (data && data.from !== currentUser?.uid) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error('Ошибка добавления ICE кандидата', e);
                }
            }
        });
    }

    function setupDataChannel(channel, peerUid) {
        channel.onopen = () => {
            console.log(`✅ Канал с ${peerUid} открыт`);
        };
        
        channel.onmessage = (event) => {
            try {
                const message = JSON.parse(event.data);
                console.log('Получено сообщение:', message);
            } catch (e) {
                console.error('Ошибка обработки сообщения', e);
            }
        };
        
        channel.onclose = () => {
            console.log(`Канал с ${peerUid} закрыт`);
        };
    }

    // ===================== ОБРАБОТЧИКИ СОБЫТИЙ =====================
    document.addEventListener('DOMContentLoaded', () => {
        console.log('🚀 Игра загружается...');

        authBtn.addEventListener('click', showAuthModal);
        
        loginSubmitBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            
            if (!email || !password) {
                showError('Введите email и пароль');
                return;
            }
            
            try {
                loginSubmitBtn.textContent = '⏳ Загрузка...';
                loginSubmitBtn.disabled = true;
                
                await loginWithEmail(email, password);
                
                loginEmail.value = '';
                loginPassword.value = '';
                hideAuthModal();
                showSuccess('Вход выполнен!');
            } catch (error) {
                showError(error.message);
            } finally {
                loginSubmitBtn.textContent = '📧 войти / регистрация';
                loginSubmitBtn.disabled = false;
            }
        });
        
        logoutBtn.addEventListener('click', logout);
        
        createRoomBtn.addEventListener('click', async () => {
            try {
                if (!currentUser) {
                    showAuthModal();
                    return;
                }
                
                createRoomBtn.textContent = '⏳ Создание...';
                createRoomBtn.disabled = true;
                
                const roomId = await createRoom();
                currentRoomId = roomId;
                
                subscribeToRoom(roomId, {
                    onUpdate: (data) => {
                        roomPlayers = data.players;
                        updateRoomUI(data);
                        
                        if (data.isHost) {
                            const peerUids = data.players.map(p => p.uid).filter(uid => uid !== currentUser?.uid);
                            if (peerUids.length > 0) {
                                initAsHost(peerUids);
                            }
                        } else {
                            const host = data.players.find(p => p.uid === data.hostUid);
                            if (host && host.uid !== currentUser?.uid) {
                                initAsClient(host.uid);
                            }
                        }
                    },
                    onRoomDeleted: () => {
                        currentRoomId = null;
                        isHost = false;
                        updateRoomUI(null);
                        closeAllConnections();
                    },
                    onPlayerRemoved: () => {
                        currentRoomId = null;
                        isHost = false;
                        updateRoomUI(null);
                        closeAllConnections();
                    }
                });
                
                showSuccess('Комната создана! Код: ' + roomId);
            } catch (error) {
                showError(error.message);
            } finally {
                createRoomBtn.textContent = '➕ создать';
                createRoomBtn.disabled = false;
            }
        });
        
        joinRoomBtn.addEventListener('click', async () => {
            const code = joinCodeInput.value.trim().toUpperCase();
            if (!code) {
                showError('Введите код комнаты');
                return;
            }
            
            if (code.length !== 6) {
                showError('Код должен быть 6 символов');
                return;
            }
            
            try {
                if (!currentUser) {
                    showAuthModal();
                    return;
                }
                
                joinRoomBtn.textContent = '⏳ Подключение...';
                joinRoomBtn.disabled = true;
                
                await joinRoom(code);
                currentRoomId = code;
                
                subscribeToRoom(code, {
                    onUpdate: (data) => {
                        roomPlayers = data.players;
                        updateRoomUI(data);
                        
                        if (data.isHost) {
                            const peerUids = data.players.map(p => p.uid).filter(uid => uid !== currentUser?.uid);
                            if (peerUids.length > 0) {
                                initAsHost(peerUids);
                            }
                        } else {
                            const host = data.players.find(p => p.uid === data.hostUid);
                            if (host && host.uid !== currentUser?.uid) {
                                initAsClient(host.uid);
                            }
                        }
                    },
                    onRoomDeleted: () => {
                        currentRoomId = null;
                        updateRoomUI(null);
                        closeAllConnections();
                    },
                    onPlayerRemoved: () => {
                        currentRoomId = null;
                        updateRoomUI(null);
                        closeAllConnections();
                    }
                });
                
                showSuccess('Присоединение выполнено!');
            } catch (error) {
                showError(error.message);
            } finally {
                joinRoomBtn.textContent = 'вход';
                joinRoomBtn.disabled = false;
            }
        });
        
        toggleRoomBtn.addEventListener('click', async () => {
            try {
                if (!currentRoomId) {
                    showError('Вы не в комнате');
                    return;
                }
                
                if (!isHost) {
                    showError('Только хост может переключать комнату');
                    return;
                }
                
                await toggleRoomActive();
                showSuccess(`Комната ${!roomActive ? 'выключена' : 'включена'}`);
            } catch (error) {
                showError(error.message);
            }
        });
        
        leaveRoomBtn.addEventListener('click', async () => {
            try {
                if (!currentRoomId) {
                    showError('Вы не в комнате');
                    return;
                }
                
                await leaveRoom();
                currentRoomId = null;
                isHost = false;
                updateRoomUI(null);
                closeAllConnections();
                showSuccess('Вы вышли из комнаты');
            } catch (error) {
                showError('Ошибка при выходе: ' + error.message);
            }
        });
        
        copyCodeBtn.addEventListener('click', () => {
            if (currentRoomId) {
                navigator.clipboard?.writeText(currentRoomId)
                    .then(() => showSuccess('Код скопирован!'))
                    .catch(() => alert('Код: ' + currentRoomId));
            }
        });
    });

    // Пинг для отслеживания активности
    setInterval(() => {
        if (currentUser && currentRoomId) {
            db.ref(`rooms/${currentRoomId}/players/${currentUser.uid}/ping`)
                .set(Date.now())
                .catch(() => {});
        }
    }, 15000);
    </script>
</body>
