<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 СОЗДАНИЕ СТРАНЫ · P2P</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <div class="top-bar">
            <div class="logo">🌍 СОЗДАНИЕ СТРАНЫ</div>
            <div class="auth-box">
                <div class="user-email" id="userEmail">не авторизован</div>
                <button id="authBtn" class="btn-small">🔑 вход</button>
            </div>
        </div>

        <!-- Игровая информация -->
        <div class="game-header">
            <div class="date-display" id="currentDate">Январь 2024</div>
            <div class="game-controls">
                <button id="startGameBtn" class="game-btn">▶️ Старт</button>
                <button id="stopGameBtn" class="game-btn">⏸️ Стоп</button>
            </div>
        </div>

        <!-- Карта мира -->
        <div class="world-screen">
            <div class="map-container" id="mapContainer">
                <!-- Провинции будут добавляться динамически -->
            </div>
        </div>

        <!-- Информация о стране -->
        <div class="country-panel" id="countryPanel">
            <div class="country-header">
                <h3 id="countryName">Страна</h3>
                <span class="country-color" id="countryColor"></span>
            </div>
            <div class="country-stats">
                <div class="stat-row">
                    <span>👥 Население:</span>
                    <span id="countryPopulation">0</span>
                </div>
                <div class="stat-row">
                    <span>💰 Золото:</span>
                    <span id="countryGold">0</span>
                </div>
                <div class="stat-row">
                    <span>⚔️ Армия:</span>
                    <span id="countryManpower">0</span>
                </div>
                <div class="stat-row">
                    <span>🔬 Технология:</span>
                    <span id="countryTech">1.0</span>
                </div>
                <div class="stat-row">
                    <span>📊 Стабильность:</span>
                    <span id="countryStability">80%</span>
                </div>
                <div class="stat-row">
                    <span>💥 Усталость:</span>
                    <span id="countryWarExhaustion">0%</span>
                </div>
                <div class="stat-row">
                    <span>🏞️ Провинций:</span>
                    <span id="provinceCount">0</span>
                </div>
            </div>
        </div>

        <!-- Панель комнаты -->
        <div class="room-panel" id="roomPanel">
            <div class="room-header">
                <h3>⚡ КОМНАТА <span id="roomStatusIcon">⚫</span></h3>
                <span class="peer-count" id="peerCounter">0 игроков</span>
            </div>

            <div class="room-code-box">
                <span class="room-code" id="roomCodeDisplay">----</span>
                <button class="copy-btn" id="copyCodeBtn">📋 копия</button>
            </div>

            <div class="room-actions">
                <button class="action-btn success-btn" id="createRoomBtn">➕ создать</button>
                <button class="action-btn" id="toggleRoomBtn">⏯️ вкл/выкл</button>
                <button class="action-btn danger-btn" id="leaveRoomBtn">🚪 выйти</button>
            </div>

            <div class="join-section">
                <input type="text" id="joinCodeInput" placeholder="код комнаты" maxlength="6">
                <button id="joinRoomBtn" class="btn-primary">вход</button>
            </div>

            <div class="player-list" id="playerListContainer">
                <div class="player-item">
                    <span>👤</span> <span>войдите чтобы играть</span>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 class="modal-title">🔐 Вход / Регистрация</h3>
            <input type="email" id="loginEmail" class="modal-input" placeholder="email">
            <input type="password" id="loginPassword" class="modal-input" placeholder="пароль">
            <button id="loginSubmitBtn" class="modal-btn">📧 войти / регистрация</button>
            <button id="logoutBtn" class="modal-btn logout-btn">🚪 выйти</button>
        </div>
    </div>

    <!-- Подключаем скрипты -->
    <script src="firebase-config.js"></script>
    <script src="ui.js"></script>
    <script src="auth.js"></script>
    <script src="game.js"></script>
    <script src="room.js"></script>
    <script src="p2p.js"></script>
    <script src="main.js"></script>
</body>
</html>
